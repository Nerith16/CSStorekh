/* ---------------- State ---------------- */
let activeCat = "All";
let cart = {}; // id -> qty
let checkoutStep = 0; // 0 = closed, 1 review, 2 shipping, 3 payment, 4 confirm
let shippingInfo = {};
let orderNumber = "";

/* ---------------- Render: tabs ---------------- */
const catTabs = document.getElementById('catTabs');
CATEGORIES.forEach(cat=>{
  const b = document.createElement('button');
  b.textContent = cat;
  if(cat===activeCat) b.classList.add('active');
  b.onclick = ()=>{ activeCat = cat; renderTabs(); renderGrid(); };
  catTabs.appendChild(b);
});
function renderTabs(){
  [...catTabs.children].forEach(b=>b.classList.toggle('active', b.textContent===activeCat));
}

/* ---------------- Render: grid ---------------- */
const grid = document.getElementById('grid');
const resultCount = document.getElementById('resultCount');
function renderGrid(){
  const items = activeCat==="All" ? PRODUCTS : PRODUCTS.filter(p=>p.cat===activeCat);
  resultCount.textContent = items.length + (items.length===1 ? " item" : " items");
  grid.innerHTML = "";
  items.forEach(p=>{
    const card = document.createElement('div');
    card.className = 'card';
    const specsHTML = p.specs && p.specs.length > 0
      ? `<ul class="specs-list">${p.specs.map(spec => `<li>${spec}</li>`).join('')}</ul>`
      : '';
    const imageHTML = p.img 
      ? `<img class="prod-img" src="${p.img}" alt="${p.name}">` 
      : ICONS[p.cat];
    const thumbBg = p.img ? '#ffffff' : PALETTES[p.cat];
    card.innerHTML = `
      <div class="thumb" style="background:${thumbBg}">
        <span class="tag">${p.cat}</span>
        ${imageHTML}
      </div>
      <div class="card-body">
        <span class="cat">${p.cat}</span>
        <h3>${p.name}</h3>
        ${specsHTML}
        <div class="price-row">
          <span class="price">$${p.price.toFixed(2)}</span>
          <button class="add-btn" data-id="${p.id}">Add to cart</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  grid.querySelectorAll('.add-btn').forEach(btn=>{
    btn.onclick = ()=>{
      const id = Number(btn.dataset.id);
      addToCart(id);
      btn.textContent = "Added ✓";
      btn.classList.add('added');
      setTimeout(()=>{ btn.textContent="Add to cart"; btn.classList.remove('added'); }, 900);
    };
  });
}
renderGrid();

/* ---------------- Cart logic ---------------- */
function addToCart(id){
  cart[id] = (cart[id]||0) + 1;
  renderCart();
}
function changeQty(id, delta){
  cart[id] = (cart[id]||0) + delta;
  if(cart[id]<=0) delete cart[id];
  renderCart();
}
function removeFromCart(id){
  delete cart[id];
  renderCart();
}
function cartLines(){
  return Object.entries(cart).map(([id,qty])=>({...PRODUCTS.find(p=>p.id===Number(id)), qty}));
}
function cartTotal(){
  return cartLines().reduce((s,l)=>s+l.price*l.qty,0);
}
function cartCountTotal(){
  return Object.values(cart).reduce((a,b)=>a+b,0);
}

const drawerItems = document.getElementById('drawerItems');
const subtotalAmt = document.getElementById('subtotalAmt');
const cartCountEl = document.getElementById('cartCount');
const checkoutBtn = document.getElementById('checkoutBtn');

function renderCart(){
  const lines = cartLines();
  cartCountEl.textContent = cartCountTotal();
  subtotalAmt.textContent = "$" + cartTotal().toFixed(2);
  checkoutBtn.disabled = lines.length===0;

  if(lines.length===0){
    drawerItems.innerHTML = `<div class="empty-cart">Your cart is empty.<br>Browse the catalog to add something.</div>`;
    return;
  }
  drawerItems.innerHTML = "";
  lines.forEach(l=>{
    const row = document.createElement('div');
    row.className = 'cart-item';
    row.innerHTML = `
      <div class="cart-thumb" style="background:${PALETTES[l.cat]}"></div>
      <div class="ci-info">
        <span class="name">${l.name}</span>
        <span class="unit">$${l.price.toFixed(2)} each</span>
        <div class="qty-row">
          <button class="qty-btn" data-act="dec" data-id="${l.id}">−</button>
          <span>${l.qty}</span>
          <button class="qty-btn" data-act="inc" data-id="${l.id}">+</button>
          <button class="remove-link" data-act="rm" data-id="${l.id}">Remove</button>
        </div>
      </div>`;
    drawerItems.appendChild(row);
  });
  drawerItems.querySelectorAll('[data-act]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = Number(btn.dataset.id);
      const act = btn.dataset.act;
      if(act==="inc") changeQty(id,1);
      if(act==="dec") changeQty(id,-1);
      if(act==="rm") removeFromCart(id);
    };
  });
}
renderCart();

/* ---------------- Drawer open/close ---------------- */
const overlay = document.getElementById('overlay');
const drawer = document.getElementById('drawer');
document.getElementById('openCart').onclick = ()=>{ overlay.classList.add('show'); drawer.classList.add('show'); };
document.getElementById('closeCart').onclick = closeDrawer;
overlay.onclick = ()=>{ closeDrawer(); closeModal(); };
function closeDrawer(){ overlay.classList.remove('show'); drawer.classList.remove('show'); }

/* ---------------- Checkout modal flow ---------------- */
const modalWrap = document.getElementById('modalWrap');
const modalBody = document.getElementById('modalBody');

checkoutBtn.onclick = ()=>{ closeDrawer(); checkoutStep = 1; renderModal(); };
function closeModal(){ modalWrap.classList.remove('show'); checkoutStep = 0; }

function stepsHTML(current){
  let dots = "";
  for(let i=1;i<=3;i++){ dots += `<span class="dot ${i<=current?'active':''}"></span>`; }
  return `<div class="steps">${dots}</div>`;
}

function renderModal(){
  if(checkoutStep===0){ modalWrap.classList.remove('show'); return; }
  modalWrap.classList.add('show');

  if(checkoutStep===1){
    const lines = cartLines();
    modalBody.innerHTML = `
      ${stepsHTML(1)}
      <h2>Review your order</h2>
      <div class="sub">${cartCountTotal()} item${cartCountTotal()===1?'':'s'}</div>
      ${lines.map(l=>`<div class="review-line"><span>${l.name} × ${l.qty}</span><span>$${(l.price*l.qty).toFixed(2)}</span></div>`).join('')}
      <div class="review-line" style="border-bottom:none; font-weight:600;"><span>Total</span><span>$${cartTotal().toFixed(2)}</span></div>
      <div class="modal-actions">
        <button class="btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn-primary" id="nextBtn">Continue to shipping</button>
      </div>`;
    document.getElementById('cancelBtn').onclick = closeModal;
    document.getElementById('nextBtn').onclick = ()=>{ checkoutStep=2; renderModal(); };
  }

  if(checkoutStep===2){
    modalBody.innerHTML = `
      ${stepsHTML(2)}
      <h2>Shipping details</h2>
      <div class="sub">Where should we send your order?</div>
      <div class="field"><label>Full name</label><input id="fName" value="${shippingInfo.name||''}" placeholder="Jane Rivera"></div>
      <div class="field"><label>Address</label><input id="fAddr" value="${shippingInfo.addr||''}" placeholder="123 Market Street"></div>
      <div class="field-row">
        <div class="field"><label>City</label><input id="fCity" value="${shippingInfo.city||''}" placeholder="Phnom Penh"></div>
        <div class="field"><label>Postal code</label><input id="fZip" value="${shippingInfo.zip||''}" placeholder="12000"></div>
      </div>
      <div class="field"><label>Email</label><input id="fEmail" value="${shippingInfo.email||''}" placeholder="jane@email.com"></div>
      <div class="modal-actions">
        <button class="btn-secondary" id="backBtn">Back</button>
        <button class="btn-primary" id="nextBtn">Continue to payment</button>
      </div>`;
    document.getElementById('backBtn').onclick = ()=>{ checkoutStep=1; renderModal(); };
    document.getElementById('nextBtn').onclick = ()=>{
      shippingInfo = {
        name: document.getElementById('fName').value.trim(),
        addr: document.getElementById('fAddr').value.trim(),
        city: document.getElementById('fCity').value.trim(),
        zip: document.getElementById('fZip').value.trim(),
        email: document.getElementById('fEmail').value.trim(),
      };
      if(!shippingInfo.name || !shippingInfo.addr || !shippingInfo.email){
        alert("Please fill in name, address, and email to continue.");
        return;
      }
      checkoutStep=3; renderModal();
    };
  }

  if(checkoutStep===3){
    modalBody.innerHTML = `
      ${stepsHTML(3)}
      <h2>Payment</h2>
      <div class="sub">Demo only — no real payment is processed.</div>
      <div class="field"><label>Card number</label><input id="cNum" placeholder="4242 4242 4242 4242" maxlength="19"></div>
      <div class="field-row">
        <div class="field"><label>Expiry</label><input id="cExp" placeholder="MM/YY" maxlength="5"></div>
        <div class="field"><label>CVC</label><input id="cCvc" placeholder="123" maxlength="4"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="backBtn">Back</button>
        <button class="btn-primary" id="payBtn">Place order — $${cartTotal().toFixed(2)}</button>
      </div>`;
    document.getElementById('backBtn').onclick = ()=>{ checkoutStep=2; renderModal(); };
    document.getElementById('payBtn').onclick = ()=>{
      const num = document.getElementById('cNum').value.trim();
      if(num.length < 12){ alert("Enter a card number to simulate payment."); return; }
      orderNumber = "FF-" + Math.floor(100000 + Math.random()*899999);
      cart = {};
      renderCart();
      checkoutStep = 4;
      renderModal();
    };
  }

  if(checkoutStep===4){
    modalBody.innerHTML = `
      <div class="confirm-wrap">
        <div class="confirm-mark">✓</div>
        <h2>Order placed</h2>
        <div class="sub">A confirmation was "sent" to ${shippingInfo.email||'your email'}.</div>
        <div class="order-no">${orderNumber}</div>
        <div class="modal-actions">
          <button class="btn-primary" id="doneBtn" style="flex:1;">Continue shopping</button>
        </div>
      </div>`;
    document.getElementById('doneBtn').onclick = closeModal;
  }
}
</script>
